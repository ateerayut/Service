services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=ServiceDb;Username=postgres;Password=postgres
      - Jwt__SigningKey=a-very-secret-key-that-is-at-least-32-chars-long
    depends_on:
      db:
        condition: service_healthy

  db:
    image: npgsql/postgresql:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ServiceDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ServiceDb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
